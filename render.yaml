services:
  - type: web
    name: cjsdiscordclient
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend
    startCommand: npm start --prefix backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: DISCORD_BOT_TOKEN
        sync: false   # set this in the Render dashboard
      - key: PORT
        value: "3001"
